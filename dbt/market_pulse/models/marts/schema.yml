version: 2

models:
  - name: fct_daily_returns
    description: >
      Daily percentage returns per ticker computed from close-to-close prices.
      First trading day per ticker is excluded (no prior close to compare against).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [date, ticker]
    columns:
      - name: date
        description: Trading date.
        tests: [not_null]
      - name: ticker
        description: Stock or ETF ticker symbol.
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'GOOGL', 'SPY', 'BTC-USD']
      - name: close
        description: Adjusted closing price.
        tests: [not_null]
      - name: prev_close
        description: Prior trading day closing price.
        tests: [not_null]
      - name: daily_return
        description: Return as a decimal (e.g. 0.012 = 1.2%).
        tests: [not_null]
      - name: daily_return_pct
        description: Return as a percentage (e.g. 1.2).
        tests: [not_null]
      - name: volume
        tests: [not_null]

  - name: fct_volatility
    description: >
      Rolling 30-day annualized volatility per ticker.
      Only includes dates where a full 30-observation window exists.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [date, ticker]
    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'GOOGL', 'SPY', 'BTC-USD']
      - name: volatility_30d_annualized_pct
        description: Annualized volatility as a percentage (stddev * sqrt(252) * 100).
        tests: [not_null]
      - name: volatility_30d_daily_pct
        description: Daily volatility as a percentage (stddev * 100).
        tests: [not_null]
      - name: obs_count
        description: Number of observations in the rolling window (always 30).
        tests: [not_null]

  - name: fct_correlations
    description: >
      Rolling 30-day pairwise return correlations between tickers.
      Grain: one row per (date, ticker_a, ticker_b) where ticker_a < ticker_b.
      Only includes dates where a full 30-observation window exists for the pair.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [date, ticker_a, ticker_b]
    columns:
      - name: date
        tests: [not_null]
      - name: ticker_a
        tests: [not_null]
      - name: ticker_b
        tests: [not_null]
      - name: correlation_30d
        description: Pearson correlation coefficient, range [-1, 1].
        tests: [not_null]
      - name: obs_count
        description: Number of observations in the rolling window (always 30).
        tests: [not_null]

  - name: fct_macro_overlay
    description: >
      Daily prices and returns enriched with forward-filled macro indicators from FRED.
      Macro columns are NULL until the FRED ingestion task is active.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [date, ticker]
    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: close
        tests: [not_null]
      - name: daily_return
        tests: [not_null]
      - name: daily_return_pct
        tests: [not_null]
      - name: fed_funds_rate
        description: Federal funds rate from FEDFUNDS series (forward-filled).
      - name: cpi
        description: CPI all items from CPIAUCSL series (forward-filled, monthly).
      - name: yield_curve_spread
        description: 10Y-2Y Treasury spread from T10Y2Y series (forward-filled).
      - name: unemployment_rate
        description: Unemployment rate from UNRATE series (forward-filled, monthly).
      - name: gdp
        description: GDP from GDP series (forward-filled, quarterly).
      - name: treasury_10y_yield
        description: 10-year Treasury yield from DGS10 series (forward-filled).
