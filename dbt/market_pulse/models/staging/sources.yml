version: 2

sources:
  - name: raw
    schema: raw
    description: Raw ingestion layer loaded by Airflow.
    tables:
      - name: raw_prices
        description: Daily OHLCV price data ingested from Yahoo Finance.
        columns:
          - name: date
            description: Trading date.
          - name: ticker
            description: Stock or ETF ticker symbol.
          - name: open
          - name: high
          - name: low
          - name: close
          - name: volume
          - name: dividends
          - name: stock_splits
          - name: extracted_at
            description: UTC timestamp of when the row was written to the database.

      - name: raw_macro
        description: >
          Macro economic indicator time series from FRED.
          Populated once the FRED ingestion task is added to the Airflow DAG.
        columns:
          - name: date
            description: Observation date.
          - name: series_id
            description: FRED series identifier (e.g. FEDFUNDS, DGS10).
          - name: metric_name
            description: Human-readable name for the series.
          - name: value
            description: Observed numeric value.
          - name: extracted_at
            description: UTC timestamp of extraction.
